<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>German TV Panel</title>
  <script>window.TV_CHANNELS = __TV_CHANNELS_JSON__;</script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
  <style>
    /* ── Reset & tokens ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #111113;
      --surface:  #1c1c1e;
      --surface2: #2c2c2e;
      --border:   rgba(255,255,255,0.10);
      --text:     #e5e5ea;
      --muted:    rgba(229,229,234,0.45);
      --accent:   #0a84ff;
      --accent-bg:rgba(10,132,255,0.15);
      --hover:    rgba(255,255,255,0.07);
      --radius:   10px;
      --font:     'Segoe UI', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */
    #sidebar {
      width: 270px;
      min-width: 200px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow: hidden;
      flex-shrink: 0;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 12px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-title {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--text);
    }

    .btn-add {
      background: var(--accent-bg);
      color: var(--accent);
      border: 1px solid rgba(10,132,255,0.3);
      border-radius: 7px;
      padding: 4px 10px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-add:hover { background: rgba(10,132,255,0.25); }

    .search-wrap {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #search {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 6px 10px;
      font-size: 0.84rem;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }

    #channel-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .cat-label {
      padding: 10px 12px 3px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      user-select: none;
    }

    .ch-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 6px 8px;
      border-radius: 8px;
      margin: 1px 6px;
      cursor: pointer;
      transition: background 0.12s;
      position: relative;
    }
    .ch-item:hover { background: var(--hover); }
    .ch-item.active {
      background: var(--accent-bg);
      box-shadow: inset 3px 0 0 var(--accent);
    }

    .ch-logo-wrap {
      width: 34px; height: 34px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 7px;
      background: rgba(255,255,255,0.05);
      overflow: hidden;
    }
    .ch-logo { width: 100%; height: 100%; object-fit: contain; padding: 3px; }
    .ch-fallback {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem; font-weight: 700;
      color: var(--accent);
      background: var(--accent-bg);
    }

    .ch-name {
      flex: 1;
      font-size: 0.86rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .ch-actions {
      display: none;
      gap: 2px;
    }
    .ch-item:hover .ch-actions { display: flex; }

    .icon-btn {
      background: none; border: none; cursor: pointer;
      padding: 4px 5px; border-radius: 6px;
      font-size: 0.8rem; line-height: 1;
      transition: background 0.15s;
    }
    .icon-btn:hover { background: var(--hover); }

    /* ── Main area ───────────────────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #000;
    }

    #player-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      position: relative;
      overflow: hidden;
    }

    #placeholder {
      text-align: center;
      color: var(--muted);
      user-select: none;
    }
    #placeholder .big-icon { font-size: 4.5rem; display: block; margin-bottom: 14px; }
    #placeholder p { font-size: 0.92rem; }

    #video {
      width: 100%; height: 100%;
      max-height: 100%;
      object-fit: contain;
      background: #000;
      display: none;
    }

    #error-msg {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      color: #ff453a;
      font-size: 0.9rem;
      padding: 24px;
      text-align: center;
    }

    /* ── Info bar ────────────────────────────────────────────────────────── */
    #info-bar {
      display: none;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 9px 16px;
      flex-shrink: 0;
    }
    #info-bar .row { display: flex; align-items: center; gap: 12px; }
    #info-bar img { height: 30px; max-width: 56px; object-fit: contain; }
    #info-bar .name { font-weight: 600; font-size: 0.88rem; }
    #info-bar .cat  { font-size: 0.72rem; color: var(--accent); margin-top: 2px; }
    #info-bar .url  {
      font-size: 0.68rem; color: var(--muted); margin-top: 1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 500px;
    }

    /* ── Modal ───────────────────────────────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      align-items: center; justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px);
    }
    #modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      width: 420px; max-width: 95vw;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }

    .modal h3 { font-size: 1.05rem; margin-bottom: 18px; }

    .modal label {
      display: flex; flex-direction: column; gap: 5px;
      margin-bottom: 13px;
      font-size: 0.78rem; font-weight: 600;
      color: var(--muted);
    }

    .modal input, .modal select {
      padding: 8px 11px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-size: 0.86rem;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s;
    }
    .modal input:focus, .modal select:focus { border-color: var(--accent); }

    .modal-actions {
      display: flex; justify-content: flex-end; gap: 10px;
      margin-top: 20px;
    }

    .btn { padding: 8px 20px; border-radius: 8px; border: none; cursor: pointer;
           font-family: var(--font); font-size: 0.86rem; font-weight: 500; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: var(--text); }
    .btn-secondary:hover { background: rgba(255,255,255,0.16); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.88; }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 540px) {
      #sidebar { width: 190px; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside id="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-title">📺 TV Sender</span>
    <button class="btn-add" id="btn-add">＋ Neu</button>
  </div>
  <div class="search-wrap">
    <input id="search" type="text" placeholder="Sender suchen…" autocomplete="off" />
  </div>
  <div id="channel-list"></div>
</aside>

<!-- Main -->
<main id="main">
  <div id="player-wrap">
    <div id="placeholder">
      <span class="big-icon">📺</span>
      <p>Sender in der Seitenleiste auswählen</p>
    </div>
    <video id="video" controls playsinline></video>
    <div id="error-msg">⚠️ Stream konnte nicht geladen werden.<br>Bitte URL in der Add-on-Konfiguration prüfen.</div>
  </div>
  <div id="info-bar">
    <div class="row">
      <img id="info-logo" src="" alt="" onerror="this.style.display='none'" />
      <div>
        <div class="name" id="info-name"></div>
        <div class="cat"  id="info-cat"></div>
        <div class="url"  id="info-url"></div>
      </div>
    </div>
  </div>
</main>

<!-- Add/Edit Modal -->
<div id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Sender hinzufügen</h3>
    <label>Name *
      <input id="f-name" type="text" placeholder="z. B. Das Erste HD" />
    </label>
    <label>Stream-URL * (.m3u8)
      <input id="f-url" type="url" placeholder="https://…/master.m3u8" />
    </label>
    <label>Logo-URL (optional)
      <input id="f-logo" type="url" placeholder="https://…/logo.png" />
    </label>
    <label>Kategorie (optional)
      <input id="f-cat" type="text" placeholder="z. B. Öffentlich-Rechtlich" list="cat-datalist" />
      <datalist id="cat-datalist">
        <option value="Öffentlich-Rechtlich"/>
        <option value="News"/>
        <option value="Regional"/>
        <option value="Kinder"/>
        <option value="Allgemein"/>
      </datalist>
    </label>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="modal-cancel">Abbrechen</button>
      <button class="btn btn-primary"   id="modal-save">Speichern</button>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let channels   = (window.TV_CHANNELS || []).map((ch, i) => ({ ...ch, _id: i }));
let nextId     = channels.length;
let activeId   = null;
let hlsInst    = null;
let searchVal  = "";
let editId     = null; // null = new, number = existing

// ── DOM refs ──────────────────────────────────────────────────────────────────
const $list      = document.getElementById("channel-list");
const $search    = document.getElementById("search");
const $video     = document.getElementById("video");
const $placeholder = document.getElementById("placeholder");
const $errorMsg  = document.getElementById("error-msg");
const $infoBar   = document.getElementById("info-bar");
const $infoLogo  = document.getElementById("info-logo");
const $infoName  = document.getElementById("info-name");
const $infoCat   = document.getElementById("info-cat");
const $infoUrl   = document.getElementById("info-url");
const $overlay   = document.getElementById("modal-overlay");
const $modalTitle= document.getElementById("modal-title");
const $fName     = document.getElementById("f-name");
const $fUrl      = document.getElementById("f-url");
const $fLogo     = document.getElementById("f-logo");
const $fCat      = document.getElementById("f-cat");

// ── Render channel list ───────────────────────────────────────────────────────
const CAT_ORDER = ["Öffentlich-Rechtlich","News","Regional","Kinder","Allgemein"];
const CAT_ICON  = {"Öffentlich-Rechtlich":"📺","News":"📰","Regional":"🗺️","Kinder":"🧸","Allgemein":"📡"};

function renderList() {
  const q = searchVal.toLowerCase();
  const filtered = channels.filter(ch =>
    ch.name.toLowerCase().includes(q) || (ch.category||"").toLowerCase().includes(q)
  );

  // Group
  const groups = {};
  for (const ch of filtered) {
    const cat = ch.category || "Allgemein";
    (groups[cat] = groups[cat] || []).push(ch);
  }

  const keys = [
    ...CAT_ORDER.filter(k => groups[k]),
    ...Object.keys(groups).filter(k => !CAT_ORDER.includes(k))
  ];

  if (keys.length === 0) {
    $list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--muted);font-size:0.82rem">Keine Sender gefunden</div>`;
    return;
  }

  $list.innerHTML = keys.map(cat => {
    const icon = CAT_ICON[cat] || "📡";
    const items = groups[cat].map(ch => {
      const isActive = ch._id === activeId;
      const logoHtml = ch.logo
        ? `<img class="ch-logo" src="${esc(ch.logo)}" alt="" onerror="this.style.display='none';this.nextSibling.style.display='flex'"/>
           <div class="ch-fallback" style="display:none">${esc(ch.name[0])}</div>`
        : `<div class="ch-fallback">${esc(ch.name[0])}</div>`;
      return `<div class="ch-item${isActive?' active':''}" data-id="${ch._id}">
        <div class="ch-logo-wrap">${logoHtml}</div>
        <span class="ch-name">${esc(ch.name)}</span>
        <div class="ch-actions">
          <button class="icon-btn" data-action="edit" data-id="${ch._id}" title="Bearbeiten">✏️</button>
          <button class="icon-btn" data-action="del"  data-id="${ch._id}" title="Löschen">🗑️</button>
        </div>
      </div>`;
    }).join("");
    return `<div class="cat-label">${icon} ${esc(cat)}</div>${items}`;
  }).join("");
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Play channel ──────────────────────────────────────────────────────────────
function playChannel(id) {
  const ch = channels.find(c => c._id === id);
  if (!ch) return;
  activeId = id;
  renderList();

  // Show player, hide placeholder & error
  $placeholder.style.display = "none";
  $errorMsg.style.display    = "none";
  $video.style.display       = "block";
  $infoBar.style.display     = "block";

  // Info bar
  $infoLogo.src   = ch.logo || "";
  $infoLogo.style.display = ch.logo ? "" : "none";
  $infoName.textContent = ch.name;
  $infoCat.textContent  = ch.category || "Allgemein";
  $infoUrl.textContent  = ch.url;

  // Destroy previous instance
  if (hlsInst) { hlsInst.destroy(); hlsInst = null; }
  $video.src = "";

  if (typeof Hls !== "undefined" && Hls.isSupported()) {
    hlsInst = new Hls({ enableWorker: false, startLevel: -1 });
    hlsInst.loadSource(ch.url);
    hlsInst.attachMedia($video);
    hlsInst.once(Hls.Events.MANIFEST_PARSED, () => $video.play().catch(()=>{}));
    hlsInst.on(Hls.Events.ERROR, (_, d) => {
      if (d.fatal) showError();
    });
  } else if ($video.canPlayType("application/vnd.apple.mpegurl")) {
    $video.src = ch.url;
    $video.play().catch(()=>{});
  } else {
    showError();
  }
}

function showError() {
  $video.style.display    = "none";
  $errorMsg.style.display = "flex";
}

// ── Events ────────────────────────────────────────────────────────────────────
$search.addEventListener("input", e => { searchVal = e.target.value; renderList(); });

$list.addEventListener("click", e => {
  const btn = e.target.closest("[data-action]");
  if (btn) {
    const id  = parseInt(btn.dataset.id);
    const act = btn.dataset.action;
    if (act === "edit") { openModal(id); return; }
    if (act === "del") {
      const ch = channels.find(c => c._id === id);
      if (!ch) return;
      if (!confirm(`"${ch.name}" wirklich löschen?`)) return;
      channels = channels.filter(c => c._id !== id);
      if (activeId === id) {
        activeId = null;
        if (hlsInst) { hlsInst.destroy(); hlsInst = null; }
        $video.src = ""; $video.style.display = "none";
        $placeholder.style.display = "";
        $errorMsg.style.display    = "none";
        $infoBar.style.display     = "none";
      }
      renderList();
      return;
    }
  }
  const item = e.target.closest(".ch-item");
  if (item) playChannel(parseInt(item.dataset.id));
});

document.getElementById("btn-add").addEventListener("click", () => openModal(null));
document.getElementById("modal-cancel").addEventListener("click", closeModal);
document.getElementById("modal-save").addEventListener("click", saveModal);
$overlay.addEventListener("click", e => { if (e.target === $overlay) closeModal(); });

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(id) {
  editId = id;
  if (id !== null) {
    const ch = channels.find(c => c._id === id);
    $modalTitle.textContent = "Sender bearbeiten";
    $fName.value  = ch.name     || "";
    $fUrl.value   = ch.url      || "";
    $fLogo.value  = ch.logo     || "";
    $fCat.value   = ch.category || "";
  } else {
    $modalTitle.textContent = "Sender hinzufügen";
    $fName.value = $fUrl.value = $fLogo.value = "";
    $fCat.value  = "Allgemein";
  }
  $overlay.classList.add("open");
  setTimeout(() => $fName.focus(), 50);
}

function closeModal() { $overlay.classList.remove("open"); }

function saveModal() {
  const name = $fName.value.trim();
  const url  = $fUrl.value.trim();
  if (!name || !url) { alert("Name und Stream-URL sind Pflichtfelder."); return; }

  if (editId !== null) {
    const ch = channels.find(c => c._id === editId);
    if (ch) { ch.name = name; ch.url = url; ch.logo = $fLogo.value.trim(); ch.category = $fCat.value.trim() || "Allgemein"; }
    if (activeId === editId) { playChannel(editId); } // re-load if active
  } else {
    channels.push({ _id: nextId++, name, url, logo: $fLogo.value.trim(), category: $fCat.value.trim() || "Allgemein" });
  }
  closeModal();
  renderList();
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderList();
</script>
</body>
</html>
