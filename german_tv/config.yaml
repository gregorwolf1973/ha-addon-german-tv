---
name: "German TV Panel"
description: "Kostenlose deutsche TV-Sender (ARD, ZDF, Arte, …) als Seitenleisten-Panel in Home Assistant."
version: "1.0.1"
slug: "german_tv"
init: false
homeassistant: "2023.1.0"
url: "https://github.com/gregorwolf1973/ha-addon-german-tv"

arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

# Ingress: Add-on erscheint direkt in der HA-Seitenleiste, kein offener Port nötig
ingress: true
ingress_port: 8099
panel_icon: "mdi:television-play"
panel_title: "TV"

# Kein Netzwerk-Port nach außen
ports: {}
ports_description: {}

# Add-on braucht keine besonderen Privilegien
privileged: []
map: []

# ── Konfigurationsoptionen ───────────────────────────────────────────────────
# Sender werden als Liste von Objekten definiert.
# Pflichtfelder: name, url
# Optionale Felder: logo (URL), category (Text)
